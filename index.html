<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .box {
            max-width: 600px;
            margin: 50px auto;
            padding: 25px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h4 class="mb-3">Claim Form</h4>

        <!-- DOS -->
        <div class="mb-3">
            <label class="form-label">DOS</label>
            <input type="date" id="dos" class="form-control">
        </div>

        <!-- Resubmission Code -->
        <div class="mb-3">
            <label class="form-label">Resubmission Code (2 digit)</label>
            <input type="number" id="resubCode" class="form-control">
        </div>

        <!-- Original Ref No -->
        <div class="mb-3">
            <label class="form-label">Original Ref No (10-15 digits)</label>
            <input type="text" id="refNo" class="form-control">
        </div>

        <!-- Kick Dropdown -->
        <div class="mb-3">
            <label class="form-label">Kick</label>
            <select id="kick" class="form-select">
                <option selected disabled>Select option</option>
                <option>Drbilling</option> 
                <option>Drpcboapprove</option>
                <option>Reconsideration</option>
                <option>Plsappeal</option>
                <option>Clmbilled</option>
                <option>zdrybilled</option>
                <option>clmdup</option> 
                <option>Fwrtilinglimit</option>
            </select>
        </div>

        <!-- Drbilling Section -->
        <div id="drbillingSection" class="hidden">

            <!-- Submit Type -->
            <div class="mb-3">
                <label class="form-label">Trying to submit</label>
                <select id="submitType" class="form-select">
                    <option>Fresh claim</option>
                    <option>Corrected claim</option>
                    <option>Appeal</option>
                </select>
            </div>

            <!-- TFL -->
            <div class="mb-3 d-flex gap-2">
                <div class="w-50">
                    <label class="form-label">TFL no of Days</label>
                    <input type="number" id="tfl" class="form-control">
                </div>

                <div class="w-50">
                    <label class="form-label">Type</label>
                    <select id="tflType" class="form-select">
                        <option>Business</option>
                        <option>Calendar</option>
                    </select>
                </div>
            </div>

            <!-- Radio -->
            <div class="mb-3">
                <label class="form-label">Select Type</label><br>
                <input type="radio" name="type" value="from" onclick="toggleType()"> From
                <input type="radio" id="dosRadio" name="type" value="dos" onclick="toggleType()"> DOS
            </div>

            <!-- From Date -->
            <div id="fromDateDiv" class="mb-3 hidden">
                <label class="form-label">Select TFL Date</label>
                <input type="date" id="fromDate" class="form-control">
                <small id="tflError" class="text-danger"></small>
            </div>

            <!-- DOS -->
            <div id="dosInputDiv" class="mb-3 hidden">
                <label class="form-label">DOS (auto-filled)</label>
                <input type="date" id="dos3" class="form-control" readonly>
                <small id="dosError" class="text-danger"></small>
            </div>

        </div>

        <!-- Submit -->
        <button class="btn btn-primary w-100" onclick="submitForm()">Submit</button>
    </div>
</div>

<script>

const dosInput = document.getElementById("dos");
const dosRadio = document.getElementById("dosRadio");

// Restrict "Select TFL Date" to past
const today = new Date().toISOString().split("T")[0];
document.getElementById("fromDate").setAttribute("max", today);

// Enable / Disable DOS radio
function toggleDosRadio() {
    if (!dosInput.value) {
        dosRadio.disabled = true;
        dosRadio.checked = false;
        document.getElementById("dosInputDiv").classList.add("hidden");
    } else {
        dosRadio.disabled = false;
    }
}

toggleDosRadio();
dosInput.addEventListener("change", toggleDosRadio);
// Sync bottom DOS whenever top DOS changes
dosInput.addEventListener("change", function () {
    if (dosRadio.checked) {
        document.getElementById("dos3").value = dosInput.value;
    }
});
// Kick dropdown logic
document.getElementById("kick").addEventListener("change", function () {
    const hideValues = ["clmdup", "Fwrtilinglimit"];

    if (hideValues.includes(this.value)) {
        document.getElementById("drbillingSection").classList.add("hidden");
    } else {
        document.getElementById("drbillingSection").classList.remove("hidden");
    }
});

// Toggle Type
function toggleType() {
    const selected = document.querySelector('input[name="type"]:checked').value;

    document.getElementById("fromDateDiv").classList.add("hidden");
    document.getElementById("dosInputDiv").classList.add("hidden");

    if (selected === "from") {
        document.getElementById("fromDateDiv").classList.remove("hidden");
    } else {
        document.getElementById("dosInputDiv").classList.remove("hidden");

        if (dosInput.value) {
            document.getElementById("dos3").value = dosInput.value;
        } else {
            document.getElementById("dos3").value = "";
        }
    }
}

// Reusable Validation
function validateTFLRange(startDateValue, tflDays, errorId) {

    const errorEl = document.getElementById(errorId);
    errorEl.innerText = "";

    if (!startDateValue || !tflDays) return true;

    let startDate = new Date(startDateValue);
    let currentDate = new Date();

    let endDate = new Date(startDate);
    endDate.setDate(endDate.getDate() + tflDays);

    startDate.setHours(0,0,0,0);
    currentDate.setHours(0,0,0,0);
    endDate.setHours(0,0,0,0);

    if (currentDate < startDate || currentDate > endDate) {
        errorEl.innerText = "Current date is outside the TFL range!";
        return false;
    }

    return true;
}

// Submit
function submitForm() {

    let tfl = parseInt(document.getElementById("tfl").value);
    let selectedType = document.querySelector('input[name="type"]:checked');

    document.getElementById("tflError").innerText = "";
    document.getElementById("dosError").innerText = "";

    if (selectedType) {

        if (selectedType.value === "from") {
            let fromDate = document.getElementById("fromDate").value;

            if (!validateTFLRange(fromDate, tfl, "tflError")) return;

        } else {
            let dosDate = dosInput.value;

            if (!validateTFLRange(dosDate, tfl, "dosError")) return;
        }
    }

    console.log("Form Submitted");
    alert("Form submitted successfully!");
}

</script>

</body>
</html>
